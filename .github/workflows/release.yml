name: Release

on:
  push:
    # Accept both `v1.2.3` and `1.2.3` tag styles. The version-verify
    # step below enforces semver shape + match against VERSION file.
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

env:
  CYRIUS_NO_WARN_SHADOW_LIB: "1"
  CYRIUS_DCE: "1"

jobs:
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  release:
    name: Build & Release
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify version
        run: |
          FILE_VERSION=$(tr -d '[:space:]' < VERSION)
          TAG="${GITHUB_REF_NAME#v}"   # strip optional leading 'v'
          echo "$TAG" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$' || {
            echo "tag ($TAG) is not semver x.y.z"; exit 1; }
          [ "$FILE_VERSION" = "$TAG" ] || {
            echo "VERSION ($FILE_VERSION) != tag ($TAG)"; exit 1; }
          grep -q '^version = "\${file:VERSION}"' cyrius.cyml || {
            echo "cyrius.cyml version must be \${file:VERSION}"; exit 1; }
          echo "Version verified: $TAG (cyrius.cyml pulls from VERSION via \${file:VERSION})"

      - name: Install Cyrius toolchain
        # cyrius.cyml `[package].cyrius` pin is the single source of truth.
        # Delegate to the upstream installer (lays out $HOME/.cyrius/{bin,
        # lib}: cycc / cyrius / cyrfmt / cyrlint + stdlib snapshot).
        # Replaces the hand-rolled two-tarball extraction used through
        # 2.1.4 — that path probed for `bin/cc5`, renamed to `cycc` in the
        # 6.x toolchain. Same body as patra / bote / agnosys on 6.x.
        run: |
          set -e
          CYRIUS_VERSION="$(grep '^cyrius = ' cyrius.cyml | head -1 | sed 's/cyrius = "\(.*\)"/\1/')"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sSf https://raw.githubusercontent.com/MacCracken/cyrius/main/scripts/install.sh | \
            CYRIUS_VERSION="$CYRIUS_VERSION" sh
          echo "$HOME/.cyrius/bin" >> "$GITHUB_PATH"

      - name: Resolve deps
        run: cyrius deps

      - name: Verify dep hashes
        run: |
          if [ -f cyrius.lock ]; then
            cyrius deps --verify
          else
            echo "::warning::cyrius.lock not committed — skipping hash verification"
          fi

      - name: Build
        run: |
          mkdir -p build
          cyrius build src/main.cyr build/t-ron
          echo "t-ron: $(wc -c < build/t-ron) bytes"

      - name: Smoke test
        run: |
          out=$(./build/t-ron 2>&1 || true)
          echo "$out" | grep -q "t-ron ready" || { echo "FAIL: t-ron smoke test"; echo "$out"; exit 1; }

      - name: Regenerate dist bundle (consumer distribution artifact)
        # Downstream consumers (daimon / phylax / bote middleware)
        # pull `dist/t-ron.cyr` via `[deps.t-ron] modules =
        # ["dist/t-ron.cyr"]`. A tagged release without
        # dist/t-ron.cyr = broken `cyrius deps` for every consumer.
        # Mirrors libro / bote release flow. See DEPS-PATTERN.md.
        run: |
          cyrius distlib || true
          test -s dist/t-ron.cyr || { echo "FAIL: dist/t-ron.cyr not produced"; exit 1; }
          echo "dist/t-ron.cyr: $(wc -l < dist/t-ron.cyr) lines, $(wc -c < dist/t-ron.cyr) bytes"

      - name: Verify dist bundle matches committed copy
        run: |
          if ! git diff --exit-code dist/t-ron.cyr; then
            echo "FAIL: dist/t-ron.cyr is stale. Regenerate via 'cyrius distlib' and commit before tagging."
            exit 1
          fi

      - name: Clean toolchain artifacts
        run: rm -f cyrius-*.tar.gz

      - name: Archive
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          git archive --format=tar.gz --prefix="t-ron-${TAG}/" -o "t-ron-${TAG}-src.tar.gz" HEAD
          cp build/t-ron     "t-ron-${TAG}-x86_64-linux"
          cp dist/t-ron.cyr  "t-ron-${TAG}.cyr"
          sha256sum "t-ron-${TAG}-src.tar.gz" "t-ron-${TAG}-x86_64-linux" "t-ron-${TAG}.cyr" cyrius.lock > SHA256SUMS

      - name: Extract changelog
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          awk "/^## \\[${TAG}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md > /tmp/body.md

      - uses: softprops/action-gh-release@v2
        with:
          name: "t-ron ${{ github.ref_name }}"
          body_path: /tmp/body.md
          prerelease: ${{ startsWith(github.ref_name, '0.') || startsWith(github.ref_name, 'v0.') }}
          files: |
            t-ron-*.tar.gz
            t-ron-*-linux
            t-ron-*.cyr
            cyrius.lock
            SHA256SUMS
