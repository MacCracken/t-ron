name: Release

on:
  push:
    # Accept both `v1.2.3` and `1.2.3` tag styles. The version-verify
    # step below enforces semver shape + match against VERSION file.
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

env:
  CYRIUS_NO_WARN_SHADOW_LIB: "1"
  CYRIUS_DCE: "1"

jobs:
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  release:
    name: Build & Release
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify version
        run: |
          FILE_VERSION=$(tr -d '[:space:]' < VERSION)
          TAG="${GITHUB_REF_NAME#v}"   # strip optional leading 'v'
          echo "$TAG" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$' || {
            echo "tag ($TAG) is not semver x.y.z"; exit 1; }
          [ "$FILE_VERSION" = "$TAG" ] || {
            echo "VERSION ($FILE_VERSION) != tag ($TAG)"; exit 1; }
          grep -q '^version = "\${file:VERSION}"' cyrius.cyml || {
            echo "cyrius.cyml version must be \${file:VERSION}"; exit 1; }
          echo "Version verified: $TAG (cyrius.cyml pulls from VERSION via \${file:VERSION})"

      - name: Install Cyrius toolchain
        run: |
          CYRIUS_VERSION="${CYRIUS_VERSION:-$(grep -E '^cyrius[[:space:]]*=' cyrius.cyml | sed -E 's/^cyrius[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/')}"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sLO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          tar xzf "cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          CYRIUS_DIR="cyrius-$CYRIUS_VERSION-x86_64-linux"
          curl -sL "https://github.com/MacCracken/cyrius/archive/refs/tags/$CYRIUS_VERSION.tar.gz" -o cyrius-src.tar.gz
          tar xzf cyrius-src.tar.gz
          CYRIUS_SRC="cyrius-$CYRIUS_VERSION"
          VERSIONED="$HOME/.cyrius/versions/$CYRIUS_VERSION"
          mkdir -p "$VERSIONED/bin" "$VERSIONED/lib"
          cp "$CYRIUS_DIR/bin/"* "$VERSIONED/bin/" 2>/dev/null || true
          cp "$CYRIUS_DIR/scripts/cyrius" "$VERSIONED/bin/cyrius" 2>/dev/null || true
          cp -r "$CYRIUS_SRC/lib/"* "$VERSIONED/lib/"
          if [ -d "$CYRIUS_DIR/deps" ]; then
            mkdir -p "$HOME/.cyrius/deps"
            cp -r "$CYRIUS_DIR/deps/"* "$HOME/.cyrius/deps/"
          fi
          chmod +x "$VERSIONED/bin/"* 2>/dev/null || true
          ln -sfn "$VERSIONED/bin" "$HOME/.cyrius/bin"
          ln -sfn "$VERSIONED/lib" "$HOME/.cyrius/lib"
          echo "$CYRIUS_VERSION" > "$HOME/.cyrius/current"
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH
          echo "CYRIUS_HOME=$HOME/.cyrius" >> $GITHUB_ENV

      - name: Resolve deps
        run: cyrius deps

      - name: Verify dep hashes
        run: |
          if [ -f cyrius.lock ]; then
            cyrius deps --verify
          else
            echo "::warning::cyrius.lock not committed — skipping hash verification"
          fi

      - name: Build
        run: |
          mkdir -p build
          cyrius build src/main.cyr build/t-ron
          echo "t-ron: $(wc -c < build/t-ron) bytes"

      - name: Smoke test
        run: |
          out=$(./build/t-ron 2>&1 || true)
          echo "$out" | grep -q "t-ron ready" || { echo "FAIL: t-ron smoke test"; echo "$out"; exit 1; }

      - name: Clean toolchain artifacts
        run: rm -f cyrius-*.tar.gz

      - name: Archive
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          git archive --format=tar.gz --prefix="t-ron-${TAG}/" -o "t-ron-${TAG}-src.tar.gz" HEAD
          cp build/t-ron "t-ron-${TAG}-x86_64-linux"
          sha256sum "t-ron-${TAG}-src.tar.gz" "t-ron-${TAG}-x86_64-linux" cyrius.lock > SHA256SUMS

      - name: Extract changelog
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          awk "/^## \\[${TAG}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md > /tmp/body.md

      - uses: softprops/action-gh-release@v2
        with:
          name: "t-ron ${{ github.ref_name }}"
          body_path: /tmp/body.md
          prerelease: ${{ startsWith(github.ref_name, '0.') || startsWith(github.ref_name, 'v0.') }}
          files: |
            t-ron-*.tar.gz
            t-ron-*-linux
            cyrius.lock
            SHA256SUMS
