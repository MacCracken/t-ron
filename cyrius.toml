[package]
name = "t-ron"
version = "0.1.0"
description = "t-ron — Cyrius port (from 6611 lines of Rust)"
license = "GPL-3.0-only"
language = "cyrius"
cyrius = "4.5.0"

[build]
entry = "src/main.cyr"
output = "t-ron"

[deps]
stdlib = ["string", "fmt", "alloc", "vec", "str", "syscalls", "io", "args", "assert", "tagged", "hashmap", "regex", "fnptr", "chrono", "freelist", "sakshi", "bigint", "json", "base64", "sigil"]

[deps.libro]
git = "https://github.com/MacCracken/libro"
path = "../libro"
tag = "1.0.3"
modules = [
    "src/error.cyr",
    "src/hasher.cyr",
    "src/entry.cyr",
    "src/verify.cyr",
    "src/chain.cyr",
    "src/query.cyr",
    "src/retention.cyr",
    "src/review.cyr",
]

[deps.bote]
git = "https://github.com/MacCracken/bote"
path = "../bote"
tag = "1.9.2"
modules = [
    "src/error.cyr",
    "src/protocol.cyr",
    "src/jsonx.cyr",
    "src/codec.cyr",
    "src/registry.cyr",
    "src/events.cyr",
    "src/audit.cyr",
    "src/dispatch.cyr",
    "src/schema.cyr",
]
