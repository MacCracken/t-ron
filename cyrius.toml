[package]
name = "t-ron"
version = "0.1.0"
description = "t-ron — Cyrius port (from 6611 lines of Rust)"
license = "GPL-3.0-only"
language = "cyrius"
cyrius = "4.5.0"

[build]
entry = "src/main.cyr"
output = "t-ron"

[deps]
stdlib = ["string", "fmt", "alloc", "vec", "str", "syscalls", "io", "args", "assert"]
